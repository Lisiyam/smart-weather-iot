<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Smart Weather Prediction</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Segoe UI", sans-serif;
    color: #333;
  }

  .card {
    background: white;
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 1s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
  }

  .icon { font-size: 64px; margin-bottom: 10px; }
  .weather { font-size: 26px; font-weight: bold; margin-bottom: 8px; }

  .confidence-text { margin-top: 10px; font-size: 14px; color: #555; }

  .progress {
    width: 100%;
    height: 12px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 8px;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00c853, #b2ff59);
    transition: width 0.8s ease;
  }

  .metrics {
    margin-top: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
    text-align: left;
    font-size: 14px;
  }

  .label { color: #777; }
  .value { text-align: right; font-weight: 600; }

  .update { margin-top: 15px; font-size: 12px; color: #777; }
</style>
</head>

<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <div class="weather" id="weather">Loading...</div>

  <div class="confidence-text" id="confidenceText">---</div>
  <div class="progress">
    <div class="bar" id="confidenceBar"></div>
  </div>

  <div class="metrics">
    <div class="label">Suhu</div><div class="value" id="field1">---</div>
    <div class="label">Humidity</div><div class="value" id="field2">---</div>
    <div class="label">Pressure</div><div class="value" id="field3">---</div>
    <div class="label">LDR ADC</div><div class="value" id="field4">---</div>
    <div class="label">Rain ADC</div><div class="value" id="field5">---</div>
    <div class="label">Cuaca</div><div class="value" id="field6">---</div>
    <div class="label">Confidence</div><div class="value" id="field7">---</div>
  </div>

  <div class="update" id="updateTime">---</div>
</div>

<script>
const CHANNEL_ID = "3217048";
const READ_API_KEY = "DCSTMH1JH3UZALJV";
const URL = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=1`;

function setUI(weather, confidence) {
  const icon = document.getElementById("icon");
  const bar = document.getElementById("confidenceBar");

  if (weather.includes("Cerah")) {
    icon.innerText = "☀️";
    document.body.style.background = "linear-gradient(135deg,#fceabb,#f8b500)";
  } else if (weather.includes("Berawan")) {
    icon.innerText = "⛅";
    document.body.style.background = "linear-gradient(135deg,#d7d2cc,#304352)";
  } else if (weather.includes("Mendung")) {
    icon.innerText = "☁️";
    document.body.style.background = "linear-gradient(135deg,#bdc3c7,#2c3e50)";
  } else if (weather.includes("Hujan")) {
    icon.innerText = "🌧️";
    document.body.style.background = "linear-gradient(135deg,#4facfe,#00f2fe)";
  } else {
    icon.innerText = "⏳";
  }

  bar.style.width = `${confidence}%`;
}

function fmtNum(val, decimals, unit = "") {
  const num = Number(val);
  if (!Number.isFinite(num)) return "—";
  return `${num.toFixed(decimals)}${unit ? " " + unit : ""}`;
}

function updateMetrics(feed) {
  document.getElementById("field1").innerText = fmtNum(feed.field1, 1, "°C");
  document.getElementById("field2").innerText = fmtNum(feed.field2, 1, "%");
  document.getElementById("field3").innerText = fmtNum(feed.field3, 1, "hPa");
  document.getElementById("field4").innerText = feed.field4 ?? "—";
  document.getElementById("field5").innerText = feed.field5 ?? "—";
  document.getElementById("field6").innerText = feed.field6 ?? "Tidak ada data";
  document.getElementById("field7").innerText = `${fmtNum(feed.field7, 0, "%")}`;
}

function loadData() {
  fetch(URL)
    .then(res => res.json())
    .then(data => {
      const feed = data.feeds?.[0] || {};
      const weather = feed.field6 || "Tidak ada data";
      const confidenceNum = Math.max(0, Math.min(100, Number(feed.field7) || 0));

      document.getElementById("weather").innerText = weather;
      document.getElementById("confidenceText").innerText = `Confidence: ${confidenceNum}%`;
      document.getElementById("updateTime").innerText =
        "Last update: " + (feed.created_at ? new Date(feed.created_at).toLocaleTimeString() : "—");

      updateMetrics(feed);
      setUI(weather, confidenceNum);
    })
    .catch(() => {
      document.getElementById("weather").innerText = "Gagal ambil data";
    });
}

loadData();
setInterval(loadData, 15000);
</script>
</body>
</html>
